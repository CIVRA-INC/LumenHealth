name: Lint, Format, and Typecheck

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-format-typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npm run build -w packages/config && npm run build -w packages/types

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck
